name: Force Update Assets

on:
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-22.04

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true

      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Convert Poetry lockfile
        run: |
          pipx install poetry
          pipx inject poetry poetry-plugin-export
          poetry export -f requirements.txt -o requirements.txt --without-hashes

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install audio dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libogg-dev libvorbis-dev

      - name: Install modified kawapack
        run: |
          pip install git+https://github.com/akgcc/kawapack
          pip freeze

      - name: Update config with sounds
        run: python append_bg_music.py

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build app
        run: cargo build --release

      - name: Run app
        env:
          PYTHONUNBUFFERED: 1
        run: ./target/release/arkdata

      - name: Commit updates
        run: |
          git config --global user.name "Kawabot"
          git config --global user.email "actions@users.noreply.github.com"
          git add cache assets
          git commit -m "Force update data"
          git push https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
